<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
    }
    .header {
      background: #22c55e;
      padding: 14px 16px;
      color: white;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .stats {
      padding: 12px 16px;
      background: white;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .stats h2 {
      font-size: 11px;
      text-transform: uppercase;
      color: #9ca3af;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
    }
    .stat-row .count {
      font-weight: 700;
      font-size: 15px;
    }
    .green { color: #22c55e; }
    .yellow { color: #f59e0b; }
    .red { color: #ef4444; }
    .grey { color: #6b7280; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: white;
      margin: 0 8px 8px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .toggle-label { font-size: 13px; color: #374151; font-weight: 500; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider { background: #22c55e; }
    input:checked + .slider:before { transform: translateX(16px); }
    .legend {
      padding: 8px 16px 12px;
    }
    .legend-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #9ca3af;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      font-size: 12px;
      color: #374151;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .footer {
      text-align: center;
      font-size: 10px;
      color: #9ca3af;
      padding: 8px;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔍 TruthLens</h1>
    <p>AI Hallucination Detector</p>
  </div>

  <div class="stats">
    <h2>Today's Session</h2>
    <div class="stat-row">
      <span class="grey">Total Checked</span>
      <span class="count grey" id="total">0</span>
    </div>
    <div class="stat-row">
      <span class="green">✓ Verified</span>
      <span class="count green" id="green">0</span>
    </div>
    <div class="stat-row">
      <span class="yellow">⚠ Uncertain</span>
      <span class="count yellow" id="yellow">0</span>
    </div>
    <div class="stat-row">
      <span class="red">✗ Contradicted</span>
      <span class="count red" id="red">0</span>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enable TruthLens</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked/>
      <span class="slider"></span>
    </label>
  </div>

  <div class="legend">
    <div class="legend-title">Legend</div>
    <div class="legend-row">
      <div class="dot" style="background:#22c55e"></div>
      Verified by trusted sources
    </div>
    <div class="legend-row">
      <div class="dot" style="background:#f59e0b"></div>
      Could not verify — use caution
    </div>
    <div class="legend-row">
      <div class="dot" style="background:#ef4444"></div>
      Contradicts known sources
    </div>
    <div class="legend-row">
      <div class="dot" style="background:#9ca3af"></div>
      Not a factual claim
    </div>
  </div>

  <div class="footer">Powered by Groq + Wikipedia + PubMed</div>
  <script type="module" src="popup.js"></script>
</body>
</html>
